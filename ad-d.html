<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>두리번 광고 D안 — 1080×1350</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; margin: 0; padding: 0; }

    .ad {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
      word-break: keep-all;
      font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    }

    .ad-photo { position: absolute; inset: 0; }
    .ad-photo img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center 25%;
      display: block;
    }

    .ad-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10,28,16,.10) 0%,
        rgba(10,28,16,.05) 30%,
        rgba(10,28,16,.70) 58%,
        rgba(10,28,16,.97) 100%
      );
    }

    .ad-content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      padding: 72px 84px;
    }

    .ad-logo {
      font-size: 42px; font-weight: 900;
      letter-spacing: -.05em; color: #fff;
    }

    .ad-bottom { margin-top: auto; }

    .ad-q {
      font-size: 74px; font-weight: 900;
      letter-spacing: -.05em; line-height: 1.1;
      color: #fff; margin-bottom: 36px;
    }

    .ad-div {
      width: 48px; height: 2.5px;
      background: #A8D4B4; margin-bottom: 32px;
    }

    .ad-ans {
      font-size: 38px; font-weight: 700;
      letter-spacing: -.04em; line-height: 1.55;
      color: rgba(255,255,255,.8);
      margin-bottom: 52px;
    }
    .ad-ans em { font-style: normal; color: #A8D4B4; }

    .ad-foot { display: flex; align-items: center; gap: 24px; }

    .ad-price-b { flex-shrink: 0; }
    .ad-price {
      font-size: 56px; font-weight: 900;
      letter-spacing: -.05em; color: #fff; line-height: 1;
    }
    .ad-unit { font-size: 24px; color: rgba(255,255,255,.4); margin-top: 6px; }

    .ad-cta {
      flex: 1; background: #fff; border-radius: 100px;
      padding: 38px; text-align: center;
      font-size: 36px; font-weight: 900;
      letter-spacing: -.02em; color: #1A3A24;
      text-decoration: none; display: block;
    }
  </style>
</head>
<body>

<div class="ad">
  <div class="ad-photo">
    <img src="https://images.unsplash.com/photo-1665121583006-46f2f6ce7add?w=1400&auto=format&fit=crop&q=85" alt="" />
  </div>
  <div class="ad-overlay"></div>
  <div class="ad-content">
    <div class="ad-logo">두리번</div>
    <div class="ad-bottom">
      <h2 class="ad-q">
        이번 주말도<br/>
        아이와 폰 문제로<br/>
        실랑이 중이신가요?
      </h2>
      <div class="ad-div"></div>
      <p class="ad-ans">
        휴대폰 없는 주말,<br/>
        지도와 나침반만 들고<br/>
        <em>아이와 떠나보세요.</em>
      </p>
      <div class="ad-foot">
        <div class="ad-price-b">
          <div class="ad-price">₩39,000</div>
          <div class="ad-unit">가족 1팀 · 정동·덕수궁 코스</div>
        </div>
        <a href="https://duribeon-556a0.web.app" class="ad-cta">지금 예약하기 →</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
